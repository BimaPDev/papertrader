services:
  papertrader:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets:ro

  monitor:
    build: .
    restart: unless-stopped
    command: ["python", "monitor.py"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets:ro
