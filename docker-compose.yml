services:
  papertrader:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "healthcheck.py", "papertrader"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  monitor:
    build: .
    restart: unless-stopped
    command: ["python", "monitor.py"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "healthcheck.py", "producer", "180"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
